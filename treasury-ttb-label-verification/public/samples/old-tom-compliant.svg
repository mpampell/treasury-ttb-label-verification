<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">
  <rect width="900" height="1200" fill="#f8f1df"/>
  <rect x="70" y="70" width="760" height="1060" rx="18" fill="#fffaf0" stroke="#1f3a5f" stroke-width="10"/>
  <text x="450" y="170" font-family="Georgia, serif" font-size="66" font-weight="700" text-anchor="middle" fill="#17202a">OLD TOM</text>
  <text x="450" y="240" font-family="Georgia, serif" font-size="56" font-weight="700" text-anchor="middle" fill="#17202a">DISTILLERY</text>
  <line x1="160" y1="285" x2="740" y2="285" stroke="#1f3a5f" stroke-width="4"/>
  <text x="450" y="365" font-family="Arial, sans-serif" font-size="42" text-anchor="middle" fill="#17202a">Kentucky Straight</text>
  <text x="450" y="420" font-family="Arial, sans-serif" font-size="42" text-anchor="middle" fill="#17202a">Bourbon Whiskey</text>
  <text x="450" y="535" font-family="Arial, sans-serif" font-size="36" text-anchor="middle" fill="#17202a">45% Alc./Vol. (90 Proof)</text>
  <text x="450" y="605" font-family="Arial, sans-serif" font-size="34" text-anchor="middle" fill="#17202a">750 mL</text>
  <text x="450" y="690" font-family="Arial, sans-serif" font-size="30" text-anchor="middle" fill="#17202a">Distilled and bottled by Old Tom Distillery</text>
  <text x="450" y="735" font-family="Arial, sans-serif" font-size="30" text-anchor="middle" fill="#17202a">Louisville, KY</text>
  <rect x="115" y="815" width="670" height="245" fill="#fff" stroke="#17202a" stroke-width="3"/>
  <text x="140" y="865" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#17202a">GOVERNMENT WARNING:</text>
  <text x="140" y="910" font-family="Arial, sans-serif" font-size="24" fill="#17202a">\(1\) According to the Surgeon General, women</text>
  <text x="140" y="945" font-family="Arial, sans-serif" font-size="24" fill="#17202a">should not drink alcoholic beverages during</text>
  <text x="140" y="980" font-family="Arial, sans-serif" font-size="24" fill="#17202a">pregnancy because of the risk of birth defects.</text>
  <text x="140" y="1015" font-family="Arial, sans-serif" font-size="24" fill="#17202a">\(2\) Consumption of alcoholic beverages impairs</text>
  <text x="140" y="1050" font-family="Arial, sans-serif" font-size="24" fill="#17202a">your ability to drive a car or operate machinery,</text>
  <text x="140" y="1085" font-family="Arial, sans-serif" font-size="24" fill="#17202a">and may cause health problems.</text>
</svg>
