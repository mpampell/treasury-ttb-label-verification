<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">
  <rect width="900" height="1200" fill="#f2f5f4"/>
  <rect x="95" y="75" width="710" height="1050" rx="10" fill="#fffdf7" stroke="#0d4b3e" stroke-width="8"/>
  <text x="450" y="165" font-family="Georgia, serif" font-size="58" font-weight="700" text-anchor="middle" fill="#0d2f29">CASA VERDE</text>
  <text x="450" y="228" font-family="Georgia, serif" font-size="46" text-anchor="middle" fill="#0d2f29">VINEYARDS</text>
  <line x1="170" y1="278" x2="730" y2="278" stroke="#0d4b3e" stroke-width="4"/>
  <text x="450" y="365" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="#17202a">Imported Red Wine</text>
  <text x="450" y="450" font-family="Arial, sans-serif" font-size="34" text-anchor="middle" fill="#17202a">13.5% Alc./Vol.</text>
  <text x="450" y="520" font-family="Arial, sans-serif" font-size="34" text-anchor="middle" fill="#17202a">750 mL</text>
  <text x="450" y="610" font-family="Arial, sans-serif" font-size="29" text-anchor="middle" fill="#17202a">Produced by Casa Verde S.A.</text>
  <text x="450" y="650" font-family="Arial, sans-serif" font-size="29" text-anchor="middle" fill="#17202a">Mendoza, Argentina</text>
  <text x="450" y="700" font-family="Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle" fill="#17202a">Product of Argentina</text>
  <rect x="125" y="805" width="650" height="245" fill="#fff" stroke="#17202a" stroke-width="3"/>
  <text x="150" y="855" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#17202a">GOVERNMENT WARNING:</text>
  <text x="150" y="900" font-family="Arial, sans-serif" font-size="23" fill="#17202a">(1) According to the Surgeon General, women</text>
  <text x="150" y="934" font-family="Arial, sans-serif" font-size="23" fill="#17202a">should not drink alcoholic beverages during</text>
  <text x="150" y="968" font-family="Arial, sans-serif" font-size="23" fill="#17202a">pregnancy because of the risk of birth defects.</text>
  <text x="150" y="1002" font-family="Arial, sans-serif" font-size="23" fill="#17202a">(2) Consumption of alcoholic beverages impairs</text>
  <text x="150" y="1036" font-family="Arial, sans-serif" font-size="23" fill="#17202a">your ability to drive a car or operate machinery,</text>
  <text x="150" y="1070" font-family="Arial, sans-serif" font-size="23" fill="#17202a">and may cause health problems.</text>
</svg>
